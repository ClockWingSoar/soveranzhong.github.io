# 修复后的Nginx虚拟主机配置
server {
    listen 80;
    server_name _;  # 使用通配符或具体域名
    root /var/www/html;
    index index.html index.htm;  # 配置默认索引文件

    # 修复的app1 location配置
    location /app1/ {
        alias /data/server/nginx/web1/;  # 确保路径最后有斜杠
        index index.html index.htm;  # 添加索引文件支持
        try_files $uri $uri/ /app1/index.html;  # 确保能找到index文件
        
        # 可选：添加适当的访问日志
        access_log /var/log/nginx/app1_access.log;
        error_log /var/log/nginx/app1_error.log error;
    }

    # 主站点的默认location
    location / {
        try_files $uri $uri/ =404;
    }
}